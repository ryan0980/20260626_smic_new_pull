name: Skopeo Export to External Link
on:
  workflow_dispatch:

jobs:
  skopeo-export:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          docker system prune -af

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Skopeo Copy and Compress
        run: |
          echo "开始下载 vLLM v0.17.0..."
          skopeo copy --src-no-creds \
            docker://vllm/vllm-openai:v0.17.0-cu130 \
            docker-archive:vllm_kimi25.tar:vllm/vllm-openai:v0.17.0-cu130
          
          echo "正在高倍压缩 (耗时较长，请稍候)..."
          gzip -9 vllm_kimi25.tar
          
          echo "开始分块 (2GB/块)..."
          mkdir -p ./output
          split -b 2000M vllm_kimi25.tar.gz ./output/vllm_kimi25_part_

      - name: Upload to Transfer.sh
        run: |
          echo "正在上传到临时存储，完成后会生成下载链接："
          for file in ./output/*; do
            echo "正在上传 $file ..."
            # 使用 transfer.sh，链接有效期通常为 14 天
            curl --upload-file "$file" "https://transfer.sh/$(basename $file)" >> download_links.txt
            echo "" >> download_links.txt
          done
          echo "--------------------------------"
          cat download_links.txt
          echo "--------------------------------"
