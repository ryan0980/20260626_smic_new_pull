name: Skopeo Pull to Docker Archive17.0
on:
  workflow_dispatch: # 手动触发

jobs:
  skopeo-export:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          echo "正在清理无用数据..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          docker system prune -af
          df -h /

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Skopeo Copy to Tar
        run: |
          echo "开始流式下载并转换镜像..."
          # 直接将 docker hub 镜像转换为本地 docker-archive 格式
          # 这种方式跳过了 docker pull 的解压过程，极大节省空间
          skopeo copy --src-no-creds \
            docker://vllm/vllm-openai:v0.17.0 \
            docker-archive:vllm_kimi25.tar:vllm/vllm-openai:v0.17.0
          
          echo "转换完成，进行压缩..."
          # 使用 gzip 进一步缩小体积
          gzip -1 vllm_kimi25.tar
          
          echo "开始分块切分 (2GB/块)..."
          mkdir -p ./output
          split -b 2000M vllm_kimi25.tar.gz ./output/vllm_v0.7_part_
          
          echo "最终生成的文件清单："
          ls -lh ./output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vllm-skopeo-tar
          path: ./output/vllm_v0.7_part_*
          retention-days: 1
