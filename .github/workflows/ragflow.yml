name: Download RAGFlow Images

on:
  workflow_dispatch: # 支持在 GitHub Actions 页面手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull and Save RAGFlow Images
        run: |
          # 定义 RAGFlow v0.25.6 官方标准的完整依赖镜像列表
          IMAGES=(
            "infiniflow/ragflow:v0.25.6"
            "infiniflow/infinity:v0.5.0-dev5"
            "mysql:5.7"
            "minio/minio:RELEASE.2023-09-04T19-57-37Z"
            "redis:7.2.4-alpine"
          )

          echo "开始拉取 RAGFlow 镜像..."
          for img in "${IMAGES[@]}"; do
            echo "正在拉取: $img"
            docker pull "$img"
          done

          echo "正在打包所有镜像为 tar 文件并使用 gzip 压缩..."
          # 将列表中的所有镜像合并保存到一个压缩包中
          docker save "${IMAGES[@]}" | gzip > ragflow-images-v0.25.6.tar.gz
          
          echo "打包完成，当前文件大小："
          du -sh ragflow-images-v0.25.6.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ragflow-images-package
          path: ragflow-images-v0.25.6.tar.gz
          retention-days: 2 # RAGFlow 镜像文件较大（通常在 3GB-4GB 以上），建议保留2天以防下载中断
