name: Download Custom Offline Images Suite (Ragflow-Deps & Ubuntu)

on:
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull and Package All Target Images
        run: |
          # 定义需要下载的目标镜像列表（已修正 latest 拼写）
          IMAGES=(
            "infiniflow/ragflow-base:latest"
            "ubuntu:24.04"
          )

          echo "=========================================="
          echo "1. 开始从官方 Hub 串行拉取所有镜像..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done

          echo "=========================================="
          echo "2. 正在合并打包并进行 gzip 极限压缩..."
          echo "=========================================="
          OUTPUT_NAME="ragflow-deps-ubuntu-images.tar.gz"
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"
          
          echo "=========================================="
          echo "打包成功！全套离线大礼包最终大小为："
          du -sh "$OUTPUT_NAME"
          echo "=========================================="

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ragflow-deps-ubuntu-package
          path: ragflow-deps-ubuntu-images.tar.gz
          retention-days: 2 # 在 GitHub 上临时保留 2 天供你点击下载
