name: Download Outline Offline Image

on:
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull and Package Outline Image
        run: |
          IMAGE_NAME="outlinewiki/outline:latest"
          OUTPUT_NAME="outline-latest-image.tar.gz"

          echo "=========================================="
          echo "1. 开始拉取 Outline 镜像..."
          echo "=========================================="
          docker pull "$IMAGE_NAME"

          echo "=========================================="
          echo "2. 正在打包并进行 gzip 压缩..."
          echo "=========================================="
          docker save "$IMAGE_NAME" | gzip > "$OUTPUT_NAME"
          
          echo "=========================================="
          echo "打包成功！Outline 离线包最终大小为："
          du -sh "$OUTPUT_NAME"
          echo "=========================================="

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: outline-image-package
          path: outline-latest-image.tar.gz
          retention-days: 2 # 在 GitHub 上临时保留 2 天供你点击下载
