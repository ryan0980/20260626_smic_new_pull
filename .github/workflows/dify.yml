name: Download Dify Latest Offline Images Suite

on:
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull and Package All Dify Images
        run: |
          # 集中定义 Dify 最新核心组件及常用中间件镜像
          IMAGES=(
            "langgenius/dify-api:latest"
            "langgenius/dify-web:latest"
            "langgenius/dify-sandbox:latest"
            "langgenius/dify-plugin-daemon:latest"
            "postgres:15-alpine"
            "valkey/valkey:8-alpine"
            "certbot/certbot"
          )

          echo "=========================================="
          echo "1. 开始从官方 Hub 串行拉取所有 Dify 镜像..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done

          echo "=========================================="
          echo "2. 正在合并打包并进行 gzip 压缩..."
          echo "=========================================="
          OUTPUT_NAME="dify-latest-images.tar.gz"
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"
          
          echo "=========================================="
          echo "打包成功！Dify 离线大礼包最终大小为："
          du -sh "$OUTPUT_NAME"
          echo "=========================================="

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: dify-latest-images-package
          path: dify-latest-images.tar.gz
          retention-days: 2 # 在 GitHub 上临时保留 2 天供你点击下载
